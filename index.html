<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Prescription Generator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- html2pdf -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        medical: {
                            teal: '#0d9488',
                            slate: '#334155',
                            coral: '#f87171',
                            blue: '#bae6fd',
                            light: '#f8fafc'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Merriweather', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        
        /* Hide scrollbar for input fields */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* A4 Print Container */
        .a4-container {
            width: 210mm;
            height: 296mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            font-size: 14px;
            color: #1e293b;
        }

        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .a4-container { box-shadow: none; margin: 0; width: 210mm; height: 296mm; }
        }

        /* Template Specifics */
        .bg-coral { background-color: #f87171; }
        .bg-lightblue { background-color: #a5f3fc; }
        .text-coral { color: #f87171; }
        
        .header-shape-right {
            position: absolute;
            top: 0;
            right: 0;
            width: 65%;
            height: 180px;
            background-color: #f87171;
            border-bottom-left-radius: 9999px;
            z-index: 1;
        }
        .header-shape-left {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 300px;
            height: 300px;
            background-color: #a5f3fc;
            border-radius: 50%;
            z-index: 1;
        }
        .header-shape-circle {
            position: absolute;
            top: 130px;
            left: 50px;
            width: 120px;
            height: 120px;
            background-color: #f87171;
            border-radius: 50%;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 3rem;
        }
        
        .watermark {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.1;
            width: 60%;
            z-index: 0;
            pointer-events: none;
        }

        .input-dashed {
            border: none;
            border-bottom: 1px dashed #94a3b8;
            background: transparent;
            outline: none;
            padding: 0 4px;
        }
        
        .rx-symbol {
            font-size: 3.5rem;
            font-family: 'Times New Roman', serif;
            font-weight: bold;
            line-height: 1;
            margin-bottom: 10px;
        }
        
        .signature-canvas {
            border: 2px dashed #cbd5e1;
            border-radius: 0.5rem;
            cursor: crosshair;
            background: #fff;
            touch-action: none;
        }
        
        .modal-backdrop {
            background-color: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(4px);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Checkbox styling */
        .form-checkbox {
            appearance: none;
            width: 1rem;
            height: 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 0.25rem;
            display: inline-block;
            vertical-align: middle;
            background-origin: border-box;
            user-select: none;
            flex-shrink: 0;
        }
        .form-checkbox:checked {
            background-color: #0d9488;
            border-color: transparent;
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='white' xmlns='http://www.w3.org/2000/svg'%3e%3cpath d='M12.207 4.793a1 1 0 010 1.414l-5 5a1 1 0 01-1.414 0l-2-2a1 1 0 011.414-1.414L6.5 9.086l4.293-4.293a1 1 0 011.414 0z'/%3e%3c/svg%3e");
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

<!-- Navbar -->
<nav class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center no-print">
    <div class="flex items-center gap-3">
        <div class="bg-teal-600 text-white p-2 rounded-lg">
            <i class="fa-solid fa-file-medical text-xl"></i>
        </div>
        <h1 class="text-xl font-bold text-slate-800 tracking-tight">RxGenerator by Swaraj</h1>
    </div>
    <div id="nav-actions" class="hidden">
        <button onclick="logout()" class="text-sm font-medium text-slate-500 hover:text-red-500 transition-colors flex items-center gap-1 bg-slate-100 hover:bg-red-50 px-3 py-1.5 rounded-md">
            <i class="fa-solid fa-sign-out-alt"></i> Reset Profile
        </button>
    </div>
</nav>

<!-- Main Container -->
<main class="flex-grow p-4 md:p-8 relative max-w-7xl mx-auto w-full">

    <!-- ==================== SCREEN 1: DOCTOR SET-UP ==================== -->
    <div id="screen-1" class="hidden max-w-xl mx-auto mt-10">
        <div class="bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 px-6 py-4 border-b border-slate-200">
                <h2 class="text-lg font-bold text-slate-800">Doctor Profile Setup</h2>
                <p class="text-sm text-slate-500">Enter your details to configure the prescription letterhead.</p>
            </div>
            <form id="doctor-form" class="p-6 space-y-4" onsubmit="saveDoctorProfile(event)">
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Doctor Name <span class="text-red-500">*</span></label>
                    <input type="text" id="doc-name" required placeholder="e.g. Dr. A" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Registration Number <span class="text-red-500">*</span></label>
                    <input type="text" id="doc-reg" required placeholder="e.g. WBMC 12345" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Field <span class="text-red-500">*</span></label>
                    <select id="doc-field" required onchange="toggleSpecialization()" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                        <option value="General Physician">General Physician</option>
                        <option value="Specialist">Specialist</option>
                    </select>
                </div>
                
                <div id="doc-spec-container" class="hidden">
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Specialization <span class="text-red-500">*</span></label>
                    <input type="text" id="doc-spec" placeholder="e.g. Cardiologist" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Degrees</label>
                    <div class="flex flex-wrap gap-4">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="M.B.B.S." class="doc-degree form-checkbox text-teal-600">
                            <span class="text-sm text-slate-700">M.B.B.S.</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="M.D." class="doc-degree form-checkbox text-teal-600">
                            <span class="text-sm text-slate-700">M.D.</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="D.M." class="doc-degree form-checkbox text-teal-600">
                            <span class="text-sm text-slate-700">D.M.</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" value="Other" id="doc-degree-other-cb" onchange="toggleOtherDegree()" class="doc-degree form-checkbox text-teal-600">
                            <span class="text-sm text-slate-700">Other</span>
                        </label>
                    </div>
                </div>
                
                <div id="doc-degree-other-container" class="hidden">
                    <input type="text" id="doc-degree-other" placeholder="Specify other degrees" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Phone No.</label>
                    <input type="text" id="doc-phone" placeholder="e.g. +91 8918323759" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Clinic Address</label>
                    <textarea id="doc-address" rows="2" placeholder="e.g. Bankura, West Bengal, India" class="w-full border border-slate-300 rounded-md p-2.5 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 outline-none transition-all"></textarea>
                </div>
                
                <div class="pt-4 border-t border-slate-100">
                    <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-4 rounded-md shadow-sm transition-colors flex items-center justify-center gap-2">
                        Proceed to Pad <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>


    <!-- ==================== SCREEN 2: PRESCRIPTION ENTRY FORM ==================== -->
    <div id="screen-2" class="hidden pb-24">
        <div class="max-w-4xl mx-auto space-y-6">
            
            <!-- Patient Section -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <h3 class="text-md font-bold text-teal-800 border-b border-teal-100 pb-2 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-user-injured text-teal-600"></i> Patient Details
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <div class="md:col-span-4">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Name *</label>
                        <input type="text" id="pat-name" required class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Age *</label>
                        <input type="text" id="pat-age" required class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Sex *</label>
                        <select id="pat-sex" required class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none bg-white">
                            <option value="M">M</option>
                            <option value="F">F</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Weight</label>
                        <input type="text" id="pat-weight" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none" placeholder="kg">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Date</label>
                        <input type="date" id="pat-date" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                    <div class="md:col-span-12">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Address</label>
                        <input type="text" id="pat-address" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                </div>
            </div>

            <!-- Vitals Section -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <h3 class="text-md font-bold text-teal-800 border-b border-teal-100 pb-2 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-heart-pulse text-teal-600"></i> On Examination (O/E)
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Blood Pressure (mmHg)</label>
                        <div class="flex items-center gap-2">
                            <input type="number" id="vital-bp-sys" placeholder="Sys" class="w-full border border-slate-300 rounded p-2 text-center focus:border-teal-500 outline-none">
                            <span class="text-slate-400 font-bold">/</span>
                            <input type="number" id="vital-bp-dia" placeholder="Dia" class="w-full border border-slate-300 rounded p-2 text-center focus:border-teal-500 outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Pulse Rate (BPM)</label>
                        <input type="number" id="vital-pr" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">SpO2 (%)</label>
                        <input type="number" id="vital-spo2" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                    <div class="md:col-span-3">
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Any other Vitals</label>
                        <textarea id="vital-other" rows="2" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none" placeholder="e.g. Temp: 98.6 F"></textarea>
                    </div>
                </div>
            </div>

            <!-- Clinical Inputs -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <h3 class="text-md font-bold text-teal-800 border-b border-teal-100 pb-2 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-stethoscope text-teal-600"></i> Clinical & Diagnostic
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Symptoms</label>
                        <textarea id="clin-symptoms" rows="2" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-2">Clinical Notes</label>
                        <div id="notes-list" class="space-y-2 mb-2">
                            <!-- Populated dynamically -->
                        </div>
                        <button onclick="addNote()" class="text-sm text-teal-600 font-semibold flex items-center gap-1 hover:text-teal-800 bg-teal-50 px-3 py-1.5 rounded border border-teal-100 transition-colors">
                            <i class="fa-solid fa-plus"></i> Add Note
                        </button>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Investigations</label>
                        <textarea id="clin-investigations" rows="2" class="w-full border border-slate-300 rounded p-2 focus:border-teal-500 outline-none"></textarea>
                    </div>
                </div>
            </div>

            <!-- Medication Section -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <div class="flex justify-between items-center border-b border-teal-100 pb-2 mb-4">
                    <h3 class="text-md font-bold text-teal-800 flex items-center gap-2">
                        <i class="fa-solid fa-pills text-teal-600"></i> Medications (Rx)
                    </h3>
                </div>
                
                <div id="medicines-list">
                    <!-- Populated dynamically -->
                </div>
                
                <button onclick="addMedicine()" class="mt-2 text-sm bg-slate-800 text-white font-semibold flex items-center gap-2 hover:bg-slate-700 px-4 py-2 rounded-lg transition-colors shadow-sm w-full justify-center">
                    <i class="fa-solid fa-plus-circle"></i> Add Medication
                </button>
            </div>

            <!-- Advices & Follow-up Section -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
                <h3 class="text-md font-bold text-teal-800 border-b border-teal-100 pb-2 mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-clipboard-list text-teal-600"></i> Advices & Follow-up
                </h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-2">Advices</label>
                        <div id="advices-list" class="space-y-2 mb-2">
                            <!-- Populated dynamically -->
                        </div>
                        <button onclick="addAdvice()" class="text-sm text-teal-600 font-semibold flex items-center gap-1 hover:text-teal-800 bg-teal-50 px-3 py-1.5 rounded border border-teal-100 transition-colors">
                            <i class="fa-solid fa-plus"></i> Add Advice
                        </button>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Follow-up Date</label>
                        <input type="date" id="follow-date" class="w-full md:w-1/3 border border-slate-300 rounded p-2 focus:border-teal-500 outline-none">
                    </div>
                </div>
            </div>

        </div>

        <!-- Sticky Bottom Bar -->
        <div class="fixed bottom-0 left-0 w-full bg-white border-t border-slate-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] p-4 z-40 no-print flex justify-center">
            <button onclick="goToPreview()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105 flex items-center gap-2">
                <i class="fa-regular fa-eye"></i> Preview Prescription
            </button>
        </div>
    </div>


    <!-- ==================== SCREEN 3: PREVIEW & SIGNATURE ==================== -->
    <div id="screen-3" class="hidden pb-10">
        
        <div class="max-w-[210mm] mx-auto mb-6 bg-white p-4 rounded-xl shadow-sm border border-slate-200 no-print flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <button onclick="setScreen('screen-2')" class="text-slate-600 hover:text-slate-800 font-semibold flex items-center gap-2 bg-slate-100 hover:bg-slate-200 px-4 py-2 rounded-lg transition-colors">
                    <i class="fa-solid fa-arrow-left"></i> Edit Form
                </button>
                <div class="h-8 w-px bg-slate-300"></div>
                <div class="flex items-center gap-2">
                    <label class="text-sm font-bold text-slate-700">Template:</label>
                    <select id="template-selector" onchange="changeTemplate(this.value)" class="border border-slate-300 rounded-lg p-2 focus:border-teal-500 outline-none text-sm font-medium bg-slate-50 cursor-pointer">
                        <option value="original">Template 1: Standard Comprehensive</option>
                        <option value="modern">Template 2: Modern Teal</option>
                        <option value="classic">Template 3: Executive Classic</option>
                        <option value="editorial">Template 4: Editorial Vibrant</option>
                        <option value="compact">Template 5: Compact Clean</option>
                    </select>
                </div>
            </div>
            <button onclick="openSignatureModal()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded-lg shadow-sm transition-colors flex items-center gap-2">
                <i class="fa-solid fa-pen-nib"></i> Confirm & Sign
            </button>
        </div>

        <!-- A4 Print Container -->
        <div class="a4-container" id="prescription-print">
            <!-- Dynamic Template Content -->
        </div>
        </div>

        <div id="download-actions" class="hidden mt-8 flex justify-center no-print">
            <button onclick="downloadPDF()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition-transform transform hover:scale-105 flex items-center gap-2 text-lg">
                <i class="fa-solid fa-download"></i> Download Print-Ready PDF
            </button>
        </div>
        
        <!-- Global Web App Footer (No Print) -->
        <div class="mt-8 mb-4 w-full text-center text-xs text-slate-400 font-medium tracking-wide no-print">
            Made with ❤️ by Swaraj
        </div>
    </div>

</main>

<!-- Signature Modal -->
<div id="signature-modal" class="fixed inset-0 modal-backdrop z-50 hidden flex justify-center items-center p-4">
    <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col">
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-signature text-teal-600"></i> Doctor's Signature</h3>
            <button onclick="closeSignatureModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <div class="p-6">
            <p class="text-sm text-slate-500 mb-2">Please sign in the box below:</p>
            <canvas id="signature-pad" class="signature-canvas w-full h-48"></canvas>
            <div class="flex justify-between mt-4">
                <button onclick="clearSignature()" class="text-sm font-semibold text-red-500 hover:text-red-700 bg-red-50 px-4 py-2 rounded">Clear</button>
                <button onclick="saveSignature()" class="bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-6 rounded shadow-sm transition-colors">Done</button>
            </div>
        </div>
    </div>
</div>

<script>
    // State Management
    let appState = {
        template: sessionStorage.getItem('selectedTemplate') || 'original',
        doctor: {
            name: '', regNo: '', field: 'General Physician', specialization: '',
            degrees: [], otherDegree: '', phone: '', address: ''
        },
        patient: { name: '', age: '', sex: 'M', weight: '', address: '', date: '' },
        clinical: { notes: [], advices: [] },
        rx: [],
        signatureDataUrl: null
    };

    // Initialization
    window.onload = () => {
        // Init dates
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('pat-date').value = today;
        appState.patient.date = today;
        
        loadDoctorProfile();
        initSignatureCanvas();
        
        // Add initial blank note, advice, rx
        addNote();
        addAdvice();
        addMedicine();
    };

    function loadDoctorProfile() {
        const saved = localStorage.getItem('doctorProfile');
        if (saved) {
            appState.doctor = JSON.parse(saved);
            document.getElementById('nav-actions').classList.remove('hidden');
            setScreen('screen-2');
        } else {
            setScreen('screen-1');
        }
    }

    function saveDoctorProfile(e) {
        e.preventDefault();
        
        appState.doctor.name = document.getElementById('doc-name').value;
        appState.doctor.regNo = document.getElementById('doc-reg').value;
        appState.doctor.field = document.getElementById('doc-field').value;
        appState.doctor.specialization = document.getElementById('doc-spec').value;
        appState.doctor.phone = document.getElementById('doc-phone').value;
        appState.doctor.address = document.getElementById('doc-address').value;
        
        let degrees = [];
        document.querySelectorAll('.doc-degree:checked').forEach(cb => {
            degrees.push(cb.value);
        });
        appState.doctor.degrees = degrees;
        appState.doctor.otherDegree = document.getElementById('doc-degree-other').value;
        
        localStorage.setItem('doctorProfile', JSON.stringify(appState.doctor));
        document.getElementById('nav-actions').classList.remove('hidden');
        setScreen('screen-2');
    }

    function logout() {
        if(confirm("Are you sure you want to reset your profile? This will clear local storage.")) {
            localStorage.removeItem('doctorProfile');
            document.getElementById('nav-actions').classList.add('hidden');
            // reset form
            document.getElementById('doctor-form').reset();
            toggleSpecialization();
            toggleOtherDegree();
            setScreen('screen-1');
        }
    }

    function toggleSpecialization() {
        const field = document.getElementById('doc-field').value;
        const container = document.getElementById('doc-spec-container');
        if (field === 'Specialist') {
            container.classList.remove('hidden');
            document.getElementById('doc-spec').required = true;
        } else {
            container.classList.add('hidden');
            document.getElementById('doc-spec').required = false;
        }
    }

    function toggleOtherDegree() {
        const isChecked = document.getElementById('doc-degree-other-cb').checked;
        const container = document.getElementById('doc-degree-other-container');
        if (isChecked) {
            container.classList.remove('hidden');
        } else {
            container.classList.add('hidden');
        }
    }

    function setScreen(screenId) {
        ['screen-1', 'screen-2', 'screen-3'].forEach(id => {
            document.getElementById(id).classList.add('hidden');
        });
        document.getElementById(screenId).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    // --- Dynamic Lists (Notes, Advices) ---
    function renderList(arrayName, containerId, inputCallback) {
        const container = document.getElementById(containerId);
        container.innerHTML = '';
        appState.clinical[arrayName].forEach((item, index) => {
            container.innerHTML += `
                <div class="flex items-center gap-2 mb-2 group">
                    <span class="font-bold text-slate-400 w-5 text-right text-sm">${index + 1}.</span>
                    <input type="text" value="${item.replace(/"/g, '&quot;')}" onchange="${inputCallback}(${index}, this.value)" 
                           class="flex-grow border-b border-slate-300 focus:border-teal-500 outline-none p-1.5 bg-transparent text-sm transition-colors" placeholder="Type here...">
                    <button onclick="removeItem('${arrayName}', ${index})" class="text-red-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity p-1"><i class="fa-solid fa-circle-minus"></i></button>
                </div>
            `;
        });
    }

        appState.clinical.notes.push('');
        renderList('notes', 'notes-list', 'updateNote');
    }
    function updateNote(index, val) { appState.clinical.notes[index] = val; }
    
    function addAdvice() {
        appState.clinical.advices.push('');
        renderList('advices', 'advices-list', 'updateAdvice');
    }
    function updateAdvice(index, val) { appState.clinical.advices[index] = val; }

    function toggleMedOtherDose(index) {

        const cont = document.getElementById(`med-dose-other-container-${index}`);
        if(val === 'Other') cont.classList.remove('hidden');
        else cont.classList.add('hidden');
    }

    function saveMedicine(index) {
        const name = document.getElementById(`med-name-${index}`).value.trim();
        if(!name) { alert('Medicine name is required'); return; }
        
        appState.rx[index] = {
            name: name,
            dose: document.getElementById(`med-dose-${index}`).value,
            doseOther: document.getElementById(`med-dose-other-${index}`) ? document.getElementById(`med-dose-other-${index}`).value : '',
            freq1: document.getElementById(`med-freq1-${index}`).value,
            freq2: document.getElementById(`med-freq2-${index}`).value,
            duration: document.getElementById(`med-duration-${index}`).value,
            notes: document.getElementById(`med-notes-${index}`).value,
            isEditing: false
        };
        renderMedicines();
    }

        appState.rx[index].isEditing = true;
        renderMedicines();

        appState.rx.splice(index, 1);

    // --- Signature Pad Logic ---
    let canvas, ctx;
    let isDrawing = false;
    
    function initSignatureCanvas() {
        canvas = document.getElementById('signature-pad');
        ctx = canvas.getContext('2d');
        
        // Set canvas internal dimensions to match display size for correct coordinate mapping
        const rect = canvas.getBoundingClientRect();
        // Fallback dimensions if modal is hidden during init
        canvas.width = rect.width || 450; 
        canvas.height = rect.height || 192;
        
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#0f172a'; // dark slate
        
        // Mouse Events
        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', endPosition);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseout', endPosition);
        
        // Touch Events
        canvas.addEventListener('touchstart', startPositionTouch, {passive: false});
        canvas.addEventListener('touchend', endPosition, {passive: false});
        canvas.addEventListener('touchmove', drawTouch, {passive: false});
    }
    
    // Resize function to call when modal opens to ensure exact matching
    function resizeCanvas() {
        const rect = canvas.parentElement.getBoundingClientRect();
        // save content
        const data = canvas.toDataURL();
        canvas.width = rect.width - 48; // padding adj
        canvas.height = 192; // h-48
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#0f172a';
        
        if(appState.signatureDataUrl) {
            let img = new Image();
            img.onload = () => ctx.drawImage(img, 0, 0);
            img.src = appState.signatureDataUrl;
        }
    }

    function startPosition(e) { isDrawing = true; draw(e); }
    function endPosition() { isDrawing = false; ctx.beginPath(); }
    
    function draw(e) {
        if (!isDrawing) return;
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function startPositionTouch(e) {
        e.preventDefault();
        isDrawing = true;
        drawTouch(e);
    }
    function drawTouch(e) {
        if (!isDrawing) return;
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        const touch = e.touches[0];
        const x = touch.clientX - rect.left;
        const y = touch.clientY - rect.top;
        ctx.lineTo(x, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x, y);
    }

    function openSignatureModal() {
        document.getElementById('signature-modal').classList.remove('hidden');
        // Small delay to allow CSS render before resize calculation
        setTimeout(resizeCanvas, 50);
    }

    function closeSignatureModal() {
        document.getElementById('signature-modal').classList.add('hidden');
    }

    function clearSignature() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        appState.signatureDataUrl = null;
        populatePrintTemplate();
    }

    function saveSignature() {
        appState.signatureDataUrl = canvas.toDataURL('image/png');
        populatePrintTemplate();
        closeSignatureModal();
        
        // Show download button once signed
        document.getElementById('download-actions').classList.remove('hidden');
    }


    // --- PDF Export ---
    function downloadPDF() {
        const element = document.getElementById('prescription-print');
        
        // Hide download button visually but it's outside a4-container anyway
        const patientName = appState.patient.name.replace(/[^a-z0-9]/gi, '_').toLowerCase() || 'patient';
        
        const opt = {
            margin:       0,
            filename:     `Prescription_${patientName}.pdf`,
            image:        { type: 'jpeg', quality: 1 },
            html2canvas:  { scale: 2, useCORS: true, logging: false, scrollY: 0 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        
        // Hide scrollbars temporarily to avoid capturing them
        document.body.style.overflow = 'hidden';
        const noPrintEls = document.querySelectorAll('.no-print');
        noPrintEls.forEach(el => el.style.display = 'none');
        
        html2pdf().set(opt).from(element).save().then(() => {
            document.body.style.overflow = '';
            noPrintEls.forEach(el => el.style.display = '');
        });
    }
